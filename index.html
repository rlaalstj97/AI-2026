<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 리터러시의 이해 - 김민서 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'tilt': 'tilt 10s infinite linear',
                    },
                    keyframes: {
                        tilt: {
                            '0%, 50%, 100%': { transform: 'rotate(0deg)' },
                            '25%': { transform: 'rotate(1deg)' },
                            '75%': { transform: 'rotate(-1deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
            background: radial-gradient(circle at 20% 30%, #e0f2fe 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #ede9fe 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #f0f9ff 0%, transparent 50%);
        }

        .glass-card {
            backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .gradient-text {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #cursor-glow {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="cursor-glow"></div>
    <div class="aurora-bg"></div>

    <header class="min-h-screen flex flex-col items-center justify-center relative px-6 overflow-hidden">
        <div class="z-10 text-center">
            <div class="inline-block px-4 py-1 mb-6 rounded-full glass-card text-blue-600 text-xs font-bold tracking-widest uppercase animate-bounce">
                Sparkling Academic Portfolio
            </div>
            <h1 class="text-6xl md:text-8xl font-bold mb-8 tracking-tighter text-slate-900">
                AI 리터러시의 <br>
                <span class="gradient-text">확실한 이해</span>
            </h1>
            <p class="text-slate-600 max-w-2xl mx-auto text-xl leading-relaxed mb-12 opacity-80">
                데이터의 파도 속에서 인공지능이라는 빛을 찾아내어,<br>
                우리 사회를 위한 따뜻한 이야기를 빚어냅니다.
            </p>
            <div class="flex gap-4 justify-center">
                <a href="#projects" class="group relative px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white transition-all rounded-2xl font-bold shadow-2xl overflow-hidden">
                    <span class="relative z-10">포트폴리오 탐험하기</span>
                </a>
            </div>
        </div>
    </header>

    <section id="projects" class="py-32">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-6">
                <div class="scroll-reveal">
                    <h2 class="text-5xl font-bold mb-4 tracking-tight text-slate-900">Main <span class="gradient-text">Archives</span></h2>
                    <p class="text-slate-500">성장의 발자취</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="cardContainer"></div>
        </div>
    </section>

    <section class="py-32">
        <div class="max-w-4xl mx-auto px-6">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-[3rem] blur opacity-10 group-hover:opacity-30 transition duration-1000"></div>
                <div class="relative glass-card p-12 rounded-[3rem] flex flex-col md:flex-row items-center gap-12">
                    <div class="relative">
                        <div class="w-56 h-72 rounded-3xl overflow-hidden shadow-2xl rotate-3 group-hover:rotate-0 transition-transform duration-500 border-4 border-white">
                             <img src="https://i.namu.wiki/i/BlqFjYJzMHQnPl7Ju6uALDRV6duAOU4BgN65uQ3TY2-QeQEmgQoJBKCw8XbNX32iyQ2okYVqZcRj1xmIPiL-bw.webp" 
                                  alt="김민서 프로필"
                                  class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                  onerror="this.src='https://via.placeholder.com/300x400?text=Profile'">
                        </div>
                        <div class="absolute -bottom-4 -right-4 w-16 h-16 bg-yellow-400 rounded-full flex items-center justify-center text-2xl shadow-xl animate-bounce">👑</div>
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <h3 class="text-blue-600 font-bold mb-2 flex items-center justify-center md:justify-start gap-2">
                             <span class="w-2 h-2 rounded-full bg-current animate-ping"></span>
                             Social Welfare Visionary
                        </h3>
                        <h2 class="text-5xl font-bold mb-6 text-slate-900">김민서</h2>
                        <div class="flex flex-wrap justify-center md:justify-start gap-3 mb-8">
                            <span class="px-4 py-2 rounded-xl bg-blue-50 text-blue-700 font-medium border border-blue-100">#사회복지학과_24학번</span>
                            <span class="px-4 py-2 rounded-xl bg-purple-50 text-purple-700 font-bold border border-purple-100">#학생회장</span>
                        </div>
                        <p class="text-xl text-slate-600 italic mb-8 leading-relaxed">
                            "인공지능의 차가운 데이터에 <br class="hidden md:block"> 따뜻한 사람의 온기를 더하고 싶습니다."
                        </p>
                        <div class="flex justify-center md:justify-start gap-4">
                            <button class="px-6 py-3 rounded-xl bg-slate-900 text-white font-bold hover:scale-105 transition-transform shadow-xl">Contact Me</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center relative">
        <div class="h-[1px] w-1/4 mx-auto bg-gradient-to-r from-transparent via-slate-200 to-transparent mb-10"></div>
        <p class="text-slate-400 text-sm tracking-widest font-light">
            DESIGNED WITH ✨ BY MINSEO KIM | 2024
        </p>
    </footer>

    <div id="modal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-3xl rounded-[2.5rem] p-10 relative z-[210] border border-white/50 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="modalBox">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900 transition-colors"><i class="fas fa-times text-2xl"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const tasks = [
            { 
                id: 1, 
                title: "AI의 이해", 
                detailTitle: "AI란 무엇인가? NotebookLM 실습",
                icon: "fa-robot", 
                color: "from-blue-400 to-cyan-400",
                longDesc: "구글 노트북LM(NotebookLM)을 활용하여 AI의 정의, 역사, 그리고 생성형 AI의 핵심 개념을 체계적으로 정리했습니다.",
                link: "./02/index.html"
            },
            { 
                id: 2, 
                title: "데이터 스토리텔링", 
                detailTitle: "Gemini 스토리북 제작",
                icon: "fa-search", 
                color: "from-purple-400 to-pink-400",
                longDesc: "공공 데이터를 분석하고 인사이트를 도출하여 시각적으로 설득력 있는 리포트를 작성하고, 이를 Gemini 스토리북으로 구현했습니다.",
                link: "./03/index.html"
            },
            { 
                id: 3, 
                title: "웹기술의 이해", 
                detailTitle: "HTML/CSS/JS 기초 및 웹 구조 학습",
                icon: "fa-code", 
                color: "from-green-400 to-emerald-400",
                longDesc: "현대 웹의 근간이 되는 HTML(구조), CSS(디자인), JavaScript(동적 기능)의 유기적인 결합 방식을 심도 있게 학습했습니다. 단순한 코딩을 넘어 사용자가 웹 환경에서 정보를 어떻게 소비하고 상호작용하는지에 대한 기술적 메커니즘을 파악했습니다.",
                link: "./04/index.html"
            },
            { 
                id: 4, 
                title: "중간고사 대체 과제", 
                detailTitle: "나와 전공을 연결하는 AI 스토리 웹페이지 제작",
                icon: "fa-link", 
                color: "from-orange-400 to-red-400",
                longDesc: "본인의 전공인 '사회복지'와 '인공지능' 기술을 결합하여 미래의 비전을 제시하는 인터랙티브 웹페이지를 제작했습니다. AI 리터러시를 통해 전공 지식을 어떻게 확장하고 사회적 가치를 창출할 수 있는지에 대한 스토리를 담았습니다.",
                link: "./05/index.html" 
            },
            { id: 5, title: "숫자의 목소리", icon: "fa-chart-bar", color: "from-indigo-400 to-blue-400" },
            { id: 6, title: "스토리의 탄생", icon: "fa-book-open", color: "from-pink-400 to-rose-400" },
            { id: 7, title: "인포그래픽 설계", icon: "fa-project-diagram", color: "from-cyan-400 to-teal-400" },
            { id: 8, title: "기술의 윤리", icon: "fa-balance-scale", color: "from-amber-400 to-yellow-400" },
            { id: 9, title: "사회 문제 해결사", icon: "fa-hands-helping", color: "from-violet-400 to-purple-400" },
            { id: 10, title: "최종 마스터피스", icon: "fa-star", color: "from-yellow-400 to-orange-400" }
        ];

        const container = document.getElementById('cardContainer');
        tasks.forEach((task) => {
            const card = document.createElement('div');
            card.className = 'glass-card p-8 rounded-[2rem] scroll-reveal group cursor-pointer';
            card.innerHTML = `
                <div class="relative z-10">
                    <div class="flex justify-between items-center mb-6">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${task.color} flex items-center justify-center text-white text-xl shadow-lg group-hover:rotate-12 transition-transform">
                            <i class="fas ${task.icon}"></i>
                        </div>
                        <span class="text-3xl font-black opacity-5">0${task.id}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-3 group-hover:text-blue-500 transition-colors text-slate-900">과제 ${task.id}</h3>
                    <p class="text-lg font-semibold mb-4 text-slate-700">${task.title}</p>
                    <div class="w-full h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r ${task.color} w-0 group-hover:w-full transition-all duration-700"></div>
                    </div>
                </div>
            `;
            card.onclick = () => openModal(task);
            container.appendChild(card);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));

        function openModal(task) {
            const modal = document.getElementById('modal');
            const modalBox = document.getElementById('modalBox');
            const content = document.getElementById('modalContent');
            const description = task.longDesc || `인공지능 리터러시를 바탕으로 과제를 완수했습니다.`;
            
            content.innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br ${task.color} flex items-center justify-center text-white text-3xl">
                        <i class="fas ${task.icon}"></i>
                    </div>
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900 mb-1">${task.title}</h2>
                        <h3 class="text-xl font-medium text-blue-500">${task.detailTitle || ""}</h3>
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="rounded-3xl overflow-hidden aspect-video bg-slate-50 flex items-center justify-center border border-slate-100">
                        <i class="fas ${task.icon} text-6xl opacity-20"></i>
                    </div>
                    <div class="flex flex-col justify-center">
                        <p class="text-xl text-slate-600 mb-6">${description}</p>
                        <a href="${task.link || '#'}" class="py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-xl hover:scale-105 transition-transform text-center">결과물 보러가기</a>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modalBox.classList.remove('scale-95', 'opacity-0');
                modalBox.classList.add('scale-100', 'opacity-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modalBox = document.getElementById('modalBox');
            modalBox.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('modal').classList.add('hidden'); }, 300);
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
